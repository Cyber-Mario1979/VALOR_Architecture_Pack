# Action Spec: WP_UPDATE_TASK_FIELDS
action_type: WP_UPDATE_TASK_FIELDS
public_command_aliases: [update_task, mark_task]
contract: VALOR-contract-orch-wp
version: v1.0.1
purpose: Assign owners, status, notes, and other mutable task or WP fields after tasks exist.
allowed_modes: [EXECUTION]
side_effect_class: MUTATES_TRUTH
idempotent: false
confirmation_required: true
status: ACTIVE_PRE_FREEZE

required_payload_fields:
  - updates

optional_payload_fields:
  - change_reason

target_fields:
  required: [wp_id]
  optional: [task_id]

result_schema_ref: schemas/objects/work_package_schema.json

notes:
  - Validate updates[] against task field constraints and WP invariants.
  - Reject attempts to write regulated schedule commitments unless explicitly permitted by policy.
