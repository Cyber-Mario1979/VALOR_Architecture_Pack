# Action Spec: RPT_GENERATE_REPORT
action_type: RPT_GENERATE_REPORT
public_command_aliases:
  - BUILD_REPORT
  - build_report
  - generate_report
  - create_report
contract: VALOR-contract-orch-rpt
version: v1.0.1
purpose: Generate a deterministic report artifact from one or more committed WP snapshots.
allowed_modes: [M1, M2]
side_effect_class: GENERATES_ARTIFACT
idempotent: true
confirmation_required: false

inputs:
  required:
    - report_type
    - wp_snapshots
  optional:
    - title
    - include_sections
    - output_format
    - stamps

outputs:
  result_schema: schemas/contracts/report_result.schema.json

projection_policy:
  mutates_wp_truth: false
  mutates_task_truth: false
  notes:
    - "Report generation is projection-only and must not correct, overwrite, or silently mutate WP/task truth."
    - "BUILD_REPORT is a public command alias; the canonical contract action_type is RPT_GENERATE_REPORT."
