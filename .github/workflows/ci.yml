name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify manifest integrity (incl. extra-file detection)
        run: python scripts/pack_validation/verify_manifest.py

      - name: Run smoke tests
        run: python smoke_test.py

      - name: Run vector-driven test harness
        run: python scripts/pack_validation/run_vector_harness.py
