contract_id: VALOR-contract-orch-ps
current_version: v1.0.1
supported_versions: [v1.0.1]
owner_subsystem: PS
called_by: Orchestration
registry_category: INTERNAL_SERVICE_RESOLVER

envelopes:
  request_schema: schemas/contracts/contract_request.schema.json
  response_schema: schemas/contracts/contract_response.schema.json

compatibility_policy:
  semver: true
  orchestration_rules:
    accept_minor_patch_within_major: true
    refuse_major_without_explicit_upgrade: true

service_scope:
  callable_category: INTERNAL_SERVICE_RESOLVER
  public_user_callable: false
  note: PS is invoked by Orchestration as an internal preset resolver and binding authority. It is not an independent public/user-callable subsystem in v1.0.1.

regulated_use_policy:
  ks_testing_only_binding_allowed: true
  regulated_output_allowed_from_testing_only_ks: false
  required_testing_only_statuses: [TESTING_ONLY, PRODUCT_TESTING_ONLY]
  required_output_stamp: PRODUCT TESTING ONLY — NOT APPROVED FOR REAL-LIFE REGULATED CQV/GMP USE.
  rule: Preset bindings to TESTING_ONLY / PRODUCT_TESTING_ONLY K&S assets may support product testing only and must not be treated as approval for real regulated CQV/GMP output.

error_taxonomy:
  standard_codes: [VALIDATION_ERROR, NOT_FOUND, CONFLICT, UNSUPPORTED_OPERATION, INTERNAL_ERROR]
  ps_subcodes: [NO_MATCH, MULTIPLE_MATCHES, BINDING_INCOMPATIBLE, RULESET_NONDETERMINISTIC, RULE_CONTRADICTION, TESTING_ONLY_BINDING_NOT_REGULATED_APPROVED, REQUIRED_BINDING_STAMP_MISSING]

actions:
  - action_type: PS_LIST_PRESETS
    internal_aliases: [list_presets_for_resolver]
    allowed_modes: [DESIGN, EXECUTION]
    side_effect_class: READ_ONLY
    idempotent: true
    confirmation_required: false
    status: ACTIVE_INTERNAL_PRE_FREEZE
    required_payload_fields: []
    optional_payload_fields: [filters]
    target_fields: {required: [], optional: []}
    result_schema_ref: schemas/contracts/ps_presets_list.schema.json

  - action_type: PS_READ_PRESET
    internal_aliases: [read_preset_for_resolver]
    allowed_modes: [DESIGN, EXECUTION]
    side_effect_class: READ_ONLY
    idempotent: true
    confirmation_required: false
    status: ACTIVE_INTERNAL_PRE_FREEZE
    required_payload_fields: [preset_id, version]
    optional_payload_fields: []
    target_fields: {required: [], optional: []}
    result_schema_ref: schemas/contracts/preset.schema.json

  - action_type: PS_RESOLVE_PRESET
    internal_aliases: [resolve_preset]
    allowed_modes: [DESIGN, EXECUTION]
    side_effect_class: READ_ONLY
    idempotent: true
    confirmation_required: false
    status: ACTIVE_INTERNAL_PRE_FREEZE
    required_payload_fields: [context]
    optional_payload_fields: [options]
    target_fields: {required: [], optional: []}
    result_schema_ref: schemas/contracts/ps_resolve_result.schema.json

  - action_type: PS_VALIDATE_BINDINGS
    internal_aliases: [validate_preset_bindings]
    allowed_modes: [DESIGN, EXECUTION]
    side_effect_class: VALIDATE_ONLY
    idempotent: true
    confirmation_required: false
    status: ACTIVE_INTERNAL_PRE_FREEZE
    required_payload_fields: [preset_id, preset_version]
    optional_payload_fields: [expected_task_pool_ref, expected_profile_ref, expected_calendar_logic_ref, expected_standards_bundle_ref, require_testing_only_stamp]
    target_fields: {required: [], optional: []}
    result_schema_ref: schemas/contracts/plan_validation_result.schema.json
    validation_rules:
      - Confirm preset binding refs resolve to governed TP/PROF/CAL/K&S assets.
      - Confirm TESTING_ONLY / PRODUCT_TESTING_ONLY K&S bindings remain blocked for real regulated CQV/GMP output.
      - Confirm required binding stamps are present before downstream WP/PLAN/RPT/DOC use.

examples:
  - name: ps_resolve_preset_request
    request:
      contract: VALOR-contract-orch-ps
      contract_version: v1.0.1
      action_id: ACT-000601
      action_type: PS_RESOLVE_PRESET
      mode: EXECUTION
      actor:
        role: Orchestration
        name: Valor
      target: {}
      payload:
        context:
          equipment_domain: ProcessEquipment
          complexity: High
          scope: Project
          optional_matching_hints:
            system_type: Process
            tags: [ProcessEquipment, HighComplexity]
      options:
        require_exact_match: true
      context:
        timestamp_utc: '2025-12-26T00:00:00Z'
