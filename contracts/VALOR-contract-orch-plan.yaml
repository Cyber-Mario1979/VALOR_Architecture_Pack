contract_id: VALOR-contract-orch-plan
current_version: v1.0.1
supported_versions: [v1.0.1]
owner_subsystem: PLAN
called_by: Orchestration
registry_category: PUBLIC_USER_CALLABLE

envelopes:
  request_schema: schemas/contracts/contract_request.schema.json
  response_schema: schemas/contracts/contract_response.schema.json

compatibility_policy:
  semver: true
  orchestration_rules:
    accept_minor_patch_within_major: true
    refuse_major_without_explicit_upgrade: true

authority_policy:
  advisory_only: true
  mutates_wp_truth: false
  commit_boundary: Proposed schedules become authoritative only when applied through WP authority after explicit user confirmation.

planning_baseline:
  normal_basis: PROFILE_BASED
  governed_profile_required: true
  no_profile_exception:
    allowed_basis: USER_DRIVEN_NO_PROFILE
    normal_operation: false
    requirement: Every task must have an accepted explicit duration override with required provenance stamps.
    required_override_fields: [task_id, duration_value, duration_unit, source_type, source_reference_or_rationale, recorded_by_or_accepted_by, timestamp_or_source_date, override_status]
    missing_duration_error: VALIDATION_ERROR / MISSING_DURATION

calendar_baseline:
  required_ref_field: calendar_logic_ref
  calendar_id: CAL-WORKWEEK
  calendar_version: v1.0.1
  canonical_calendar_id: CAL-WORKWEEK
  canonical_calendar_version: v1
  package_asset_version: v1.0.1
  timezone: UTC+02:00
  africa_cairo_canonical: false
  rule: CAL-WORKWEEK_v1.0.1 is an architecture-pack wrapper around canonical CAL-WORKWEEK v1.

duration_unit_policy:
  working_days: Use Calendar Logic arithmetic.
  calendar_days: Use calendar-day arithmetic and label the result as calendar days.
  calendar_weeks: Allowed only when explicitly declared in the profile entry.
  calendar_months: Allowed only when explicitly declared in the profile entry.
  no_implicit_month_to_working_day_conversion: true
  unsupported_conversion_error: UNSUPPORTED_OPERATION / UNIT_CONVERSION_NOT_APPROVED

error_taxonomy:
  standard_codes: [MODE_VIOLATION, VALIDATION_ERROR, INVARIANT_VIOLATION, NOT_FOUND, CONFLICT, UNSUPPORTED_OPERATION, INTERNAL_ERROR]
  plan_subcodes: [MISSING_REQUIRED_FIELD, MISSING_DURATION, CALENDAR_LOGIC_MISSING, CALENDAR_VERSION_UNSUPPORTED, CYCLE_DETECTED, PAYLOAD_SCHEMA_MISMATCH, STAMPS_MISSING, UNIT_CONVERSION_NOT_APPROVED, PROFILE_EXPIRED, CALENDAR_EXPIRED]

actions:
  - action_type: PLAN_GENERATE_PROPOSAL
    public_command_aliases: [schedule_tasks, generate_plan, plan_wp]
    allowed_modes: [EXECUTION]
    side_effect_class: GENERATES_ARTIFACT
    idempotent: true
    confirmation_required: false
    status: ACTIVE_FROZEN
    required_payload_fields: [wp_snapshot, dependency_graph, planning_basis, calendar_logic_ref, provenance_stamps]
    optional_payload_fields: [profile_ref, no_profile_override_stamp_set, constraints, options]
    target_fields: {required: [wp_id], optional: []}
    result_schema_ref: schemas/contracts/plan_proposal.schema.json
    validation_rules:
      - When planning_basis=PROFILE_BASED, profile_ref is required and must resolve to a governed profile.
      - When planning_basis=USER_DRIVEN_NO_PROFILE, every task must have an accepted explicit duration override with provenance stamps.
      - PLAN preview is represented by this action with options.dry_run=true; no PLAN_PREVIEW action is registered.
      - Planning returns PROPOSED schedules only and does not mutate WP truth.
      - Mixed duration units must follow duration_unit_policy with no implicit calendar-month-to-working-day conversion.

  - action_type: PLAN_VALIDATE_PROPOSAL
    public_command_aliases: [validate_plan]
    allowed_modes: [EXECUTION]
    side_effect_class: VALIDATE_ONLY
    idempotent: true
    confirmation_required: false
    status: ACTIVE_FROZEN
    required_payload_fields: [plan_proposal]
    optional_payload_fields: []
    target_fields: {required: [wp_id], optional: []}
    result_schema_ref: schemas/contracts/plan_validation_result.schema.json
    validation_rules:
      - Validate proposal state remains PROPOSED until applied by WP.
      - Validate required provenance stamps are present.
      - Validate calendar wrapper/canonical version fields are present and consistent.
      - Validate mixed-unit labels and unsupported conversion refusals.
