contract_id: VALOR-contract-orch-wp
current_version: v1.0.1
supported_versions: [v1.0.1]
owner_subsystem: WP
called_by: Orchestration
registry_category: PUBLIC_USER_CALLABLE

envelopes:
  request_schema: schemas/contracts/contract_request.schema.json
  response_schema: schemas/contracts/contract_response.schema.json

compatibility_policy:
  semver: true
  orchestration_rules:
    accept_minor_patch_within_major: true
    refuse_major_without_explicit_upgrade: true

stamp_policy:
  required_for_mutations: false
  required_for_truth_commit_or_apply: true
  required_for_regulated_outputs: true
  plan_apply_stamp_rule: Applying a plan proposal to committed WP dates requires planning provenance stamps and calendar logic reference.
  testing_only_rule: TESTING_ONLY / PRODUCT_TESTING_ONLY standards bundle refs may be stored for product testing provenance only and must not approve regulated output.

error_taxonomy:
  standard_codes: [MODE_VIOLATION, VALIDATION_ERROR, INVARIANT_VIOLATION, NOT_FOUND, CONFLICT, UNSUPPORTED_OPERATION, INTERNAL_ERROR]
  wp_subcodes: [PROVENANCE_STAMP_MISSING, PLAN_PROPOSAL_NOT_FOUND, PAYLOAD_SCHEMA_MISMATCH, CYCLE_DETECTED, TESTING_ONLY_KS_NOT_REGULATED_APPROVED]

actions:
  - action_type: WP_GET
    public_command_aliases: [show_wp, get_wp]
    allowed_modes: [DESIGN, EXECUTION]
    side_effect_class: READ_ONLY
    idempotent: true
    confirmation_required: false
    status: ACTIVE_FROZEN
    required_payload_fields: []
    optional_payload_fields: [include_tasks, include_dependencies, include_metadata]
    target_fields: {required: [wp_id], optional: []}
    result_schema_ref: schemas/objects/work_package_schema.json

  - action_type: WP_CREATE
    public_command_aliases: [create_wp, new_wp]
    allowed_modes: [EXECUTION]
    side_effect_class: MUTATES_TRUTH
    idempotent: false
    confirmation_required: true
    status: ACTIVE_FROZEN
    required_payload_fields: [wp_seed]
    optional_payload_fields: [labels, notes]
    target_fields: {required: [], optional: []}
    result_schema_ref: schemas/objects/work_package_schema.json

  - action_type: WP_STAGE_TASKS
    public_command_aliases: [stage_tasks]
    allowed_modes: [EXECUTION]
    side_effect_class: STAGE_ONLY
    idempotent: true
    confirmation_required: false
    status: ACTIVE_FROZEN
    required_payload_fields: [task_set_ref]
    optional_payload_fields: [include_optional_tasks, overrides]
    target_fields: {required: [wp_id], optional: []}
    result_schema_ref: schemas/contracts/staged_task_set.schema.json

  - action_type: WP_COMMIT_STAGED_TASKS
    public_command_aliases: [commit_tasks]
    allowed_modes: [EXECUTION]
    side_effect_class: MUTATES_TRUTH
    idempotent: true
    confirmation_required: true
    status: ACTIVE_FROZEN
    required_payload_fields: [staged_task_set_id]
    optional_payload_fields: [provenance_stamps]
    target_fields: {required: [wp_id], optional: []}
    result_schema_ref: schemas/objects/work_package_schema.json

  - action_type: WP_UPDATE_TASK_FIELDS
    public_command_aliases: [update_task, mark_task]
    allowed_modes: [EXECUTION]
    side_effect_class: MUTATES_TRUTH
    idempotent: false
    confirmation_required: true
    status: ACTIVE_FROZEN
    required_payload_fields: [updates]
    optional_payload_fields: [change_reason]
    target_fields: {required: [wp_id], optional: [task_id]}
    result_schema_ref: schemas/objects/work_package_schema.json
    action_block_ref: action_blocks/WP_UPDATE_TASK_FIELDS.yaml

  - action_type: WP_APPLY_PLAN_PROPOSAL
    public_command_aliases: [apply_plan, commit_schedule]
    allowed_modes: [EXECUTION]
    side_effect_class: MUTATES_TRUTH
    idempotent: false
    confirmation_required: true
    status: ACTIVE_FROZEN
    required_payload_fields: [plan_proposal_id, date_updates, planning_provenance_stamps, calendar_logic_ref]
    optional_payload_fields: [change_reason, no_profile_override_stamp_set]
    target_fields: {required: [wp_id], optional: []}
    result_schema_ref: schemas/objects/work_package_schema.json
    action_block_ref: action_blocks/WP_APPLY_PLAN_PROPOSAL.yaml
    validation_rules:
      - Only a PROPOSED plan generated by PLAN may be applied.
      - Applying a plan writes committed_start_date and committed_finish_date in WP truth.
      - planning_provenance_stamps and calendar_logic_ref are mandatory gates.
      - TESTING_ONLY / PRODUCT_TESTING_ONLY references do not approve regulated output.

  - action_type: WP_BIND_PRESET_CONTEXT
    public_command_aliases: [load_preset_context, bind_preset_context]
    allowed_modes: [EXECUTION]
    side_effect_class: MUTATES_TRUTH
    idempotent: true
    confirmation_required: true
    status: ACTIVE_FROZEN
    required_payload_fields: [preset_context]
    optional_payload_fields: [governed_binding_stamps]
    target_fields: {required: [wp_id], optional: []}
    result_schema_ref: schemas/objects/work_package_schema.json
    action_block_ref: action_blocks/WP_BIND_PRESET_CONTEXT.yaml
    validation_rules:
      - Preset context should use equipment_domain, complexity, and scope as primary applicability fields.
      - TESTING_ONLY / PRODUCT_TESTING_ONLY K&S bindings remain product-testing-only until source metadata acceptance.
